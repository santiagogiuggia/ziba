<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café del Día - Punto de Venta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Café del Día - POS</h1>
        <nav>
            <a href="reportes.html">Ver Reportes de Venta</a>
        </nav>
    </header>

    <main class="pos-main">
        <section id="sale-interface">
            <div id="menu-filters">
                </div>
            <div id="menu-grid">
                </div>
        </section>

        <aside id="order-summary">
            <h2>Pedido Actual</h2>
            <div class="order-number">Pedido N°: <span id="current-order-id">--</span></div>
            <ul id="order-items-list">
                <li>Agrega productos al pedido.</li>
            </ul>
            <div id="order-total">
                <strong>Total: $0</strong>
            </div>
            <button id="process-sale-btn">Cobrar y Comandar</button>
        </aside>
    </main>

    <div id="size-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 id="size-modal-product-name"></h3>
            <div id="size-modal-options"></div>
            <button id="size-modal-close">Cancelar</button>
        </div>
    </div>

    <div id="checkout-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>Finalizar Venta</h3>
            <div class="checkout-total">Total a Pagar: <span id="checkout-total-amount"></span></div>
            <div class="checkout-input">
                <label for="amount-received">Dinero Recibido:</label>
                <input type="number" id="amount-received" placeholder="Ej: 5000">
            </div>
            <div class="checkout-change">Vuelto: <span id="checkout-change-amount">$0</span></div>
            <div class="checkout-actions">
                <button id="checkout-confirm-btn" class="confirm">Confirmar Pago</button>
                <button id="checkout-cancel-btn">Cancelar</button>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2025 Café del Día. Todos los derechos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
