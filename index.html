<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café del Día - Punto de Venta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Café del Día - POS</h1>
        <nav>
            <a href="reportes.html">Ver Reportes de Venta</a>
            <a href="admin.html">Administrar Productos</a>
        </nav>
    </header>

    <div id="update-notification" class="hidden">
        ¡El menú ha sido actualizado! Refrescando productos...
    </div>

    <main class="pos-main">
        <section id="sale-interface">
            <div id="menu-filters">
                </div>
            <div id="menu-grid">
                </div>
        </section>

        <aside id="order-summary">
            <h2>Pedido Actual</h2>
            <div class="order-number">Pedido N°: <span id="current-order-id">--</span></div>
            <ul id="order-items-list">
                <li>Agrega productos al pedido.</li>
            </ul>
            <div id="order-total">
                <strong>Total: $0</strong>
            </div>
            
            <div class="order-actions">
                <button id="hold-order-btn">Guardar Pedido</button>
                <button id="view-held-orders-btn">Ver Guardados</button>
            </div>

            <button id="process-sale-btn">Cobrar y Comandar</button>
        </aside>
    </main>

    <div id="size-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 id="size-modal-product-name"></h3>
            <div id="size-modal-options"></div>
            <button id="size-modal-close">Cancelar</button>
        </div>
    </div>

    <div id="checkout-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>
